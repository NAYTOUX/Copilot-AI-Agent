name: Validate Copilot Customizations

on:
  pull_request:
    paths:
      - AGENTS.md
      - .github/**
      - docs/**
      - examples/**
  push:
    paths:
      - AGENTS.md
      - .github/**
      - docs/**
      - examples/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-copilot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run orchestrator checks
        run: python .github/scripts/run_orchestrator_checks.py
